
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
#pt-wrap { padding: 12px 0; }
.pt-title { font-size: 18px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 12px; }
.legend { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.leg-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--color-text-secondary); }
.leg-dot { width: 10px; height: 10px; border-radius: 3px; }
.grid { display: grid; grid-template-columns: repeat(18, 1fr); gap: 2px; width: 100%; }
.cell {
  aspect-ratio: 1;
  border-radius: 3px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; transition: transform 0.1s, box-shadow 0.1s;
  border: 0.5px solid transparent;
  position: relative;
  min-width: 0;
}
.cell:hover { transform: scale(1.15); z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,0.18); }
.cell .num { font-size: 5.5px; color: inherit; opacity: 0.7; line-height: 1; }
.cell .sym { font-size: 9px; font-weight: 500; color: inherit; line-height: 1.1; }
.cell .name { font-size: 4.5px; color: inherit; opacity: 0.75; line-height: 1; }
.spacer { background: transparent !important; cursor: default; pointer-events: none; }
.lanthanide-label, .actinide-label {
  grid-column: 1 / 4; font-size: 7px; color: var(--color-text-secondary);
  display: flex; align-items: center; justify-content: flex-end; padding-right: 3px;
}
/* Modal */
#modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 100; align-items: center; justify-content: center;
}
#modal-bg.open { display: flex; }
#modal {
  background: var(--color-background-primary);
  border-radius: var(--border-radius-lg);
  border: 0.5px solid var(--color-border-tertiary);
  padding: 20px 24px;
  max-width: 480px; width: 90%; max-height: 85vh; overflow-y: auto;
  position: relative;
}
#modal-close {
  position: absolute; top: 12px; right: 14px;
  background: none; border: none; cursor: pointer;
  font-size: 20px; color: var(--color-text-secondary);
}
#modal-header { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 16px; }
#modal-badge {
  width: 56px; height: 56px; border-radius: 10px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  flex-shrink: 0;
}
#modal-badge .m-num { font-size: 10px; opacity: 0.75; }
#modal-badge .m-sym { font-size: 22px; font-weight: 500; }
#modal-badge .m-mass { font-size: 9px; opacity: 0.75; }
#modal-info h2 { font-size: 18px; font-weight: 500; color: var(--color-text-primary); }
#modal-info .cat-badge {
  display: inline-block; font-size: 11px; padding: 2px 8px;
  border-radius: 4px; margin-top: 3px;
}
.props-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.prop-card {
  background: var(--color-background-secondary);
  border-radius: var(--border-radius-md);
  padding: 8px 10px;
}
.prop-card .p-label { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 2px; }
.prop-card .p-val { font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
.section-title { font-size: 13px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 8px; }
.countries-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.country-chip {
  font-size: 12px; padding: 4px 10px;
  border-radius: 20px;
  border: 0.5px solid var(--color-border-secondary);
  color: var(--color-text-secondary);
  background: var(--color-background-secondary);
}
.use-list { list-style: none; }
.use-list li {
  font-size: 13px; color: var(--color-text-secondary);
  padding: 4px 0; border-bottom: 0.5px solid var(--color-border-tertiary);
  display: flex; align-items: flex-start; gap: 6px;
}
.use-list li::before { content: "→"; color: var(--color-text-tertiary); flex-shrink: 0; }
</style>

const grid = document.getElementById('grid');

layout.forEach((row, ri) => {
  row.forEach((num, ci) => {
    const cell = document.createElement('div');
    cell.className = 'cell';
    if (num === 0) {
      cell.className += ' spacer';
    } else if (num === -1) {
      cell.innerHTML = '<span style="font-size:5px;color:var(--color-text-secondary);text-align:center;">57–71</span>';
      cell.style.background = cats.lanthanide.bg;
      cell.style.color = cats.lanthanide.text;

      cell.innerHTML = '<span style="font-size:5px;color:var(--color-text-secondary);text-align:center;">89–103</span>';

      cell.style.color = cats.actinide.text;
      cell.style.cursor = 'default';

      cell.style.background = 'transparent';
      cell.style.cursor = 'default';
      cell.innerHTML = '<span style="font-size:6px;color:var(--color-text-secondary);">La</span>';

const legend = document.getElementById('legend');
Object.entries(cats).forEach(([key, val]) => {
  if (key === 'unknown') return;
  const item = document.createElement('div');
  item.className = 'leg-item';
  item.innerHTML = `<div class="leg-dot" style="background:${val.bg};border:0.5px solid ${val.text}40;"></div><span>${val.label}</span>`;
  legend.appendChild(item);
});

function openModal(el) {
  const c = cats[el.cat];
  document.getElementById('modal-badge').style.background = c.bg;
  document.getElementById('modal-badge').style.color = c.text;
  document.getElementById('m-num').textContent = el.n;
  document.getElementById('m-sym').textContent = el.sym;
  document.getElementById('m-mass').textContent = el.mass;
  document.getElementById('m-name').textContent = el.name;
  const catBadge = document.getElementById('m-cat');
  catBadge.textContent = c.label;
  catBadge.style.background = c.bg;
  catBadge.style.color = c.text;
  document.getElementById('m-an').textContent = el.n;
  document.getElementById('m-am').textContent = el.mass + ' u';
  document.getElementById('m-state').textContent = el.state;
  document.getElementById('m-en').textContent = el.en;
  document.getElementById('m-mp').textContent = el.mp;
  document.getElementById('m-bp').textContent = el.bp;
  const cl = document.getElementById('m-countries');
  cl.innerHTML = el.countries.map(c => `<span class="country-chip">${c}</span>`).join('');
  const ul = document.getElementById('m-uses');
  ul.innerHTML = el.uses.map(u => `<li>${u}</li>`).join('');
  document.getElementById('modal-bg').classList.add('open');
}

document.getElementById('modal-close').addEventListener('click', () => {
  document.getElementById('modal-bg').classList.remove('open');
});
document.getElementById('modal-bg').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-bg'))
    document.getElementById('modal-bg').classList.remove('open');
});
</script>
