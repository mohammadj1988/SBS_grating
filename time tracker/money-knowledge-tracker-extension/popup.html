<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <h1>Money &amp; Knowledge Tracker</h1>
    <nav id="tabs">
      <button class="tab active" data-view="log">Daily Log</button>
      <button class="tab" data-view="history">History</button>
      <button class="tab" data-view="monthly">Monthly</button>
    </nav>
  </header>

  <!-- DAILY LOG -->
  <section id="view-log">
    <div class="top-bar">
      <input type="date" id="dateInput">
      <span id="totalBadge">0h / 24h</span>
    </div>
    <div id="sliders"></div>
    <p id="overWarning" class="warn" hidden>Total exceeds 24 hours — adjust your entries.</p>
    <canvas id="pieCanvas" width="480" height="340"></canvas>
  </section>

  <!-- HISTORY -->
  <section id="view-history" hidden>
    <h2>Saved Days</h2>
    <div id="historyList"></div>
  </section>

  <!-- MONTHLY -->
  <section id="view-monthly" hidden>
    <div class="top-bar">
      <select id="monthSelect"></select>
    </div>
    <h2 id="monthTitle"></h2>
    <canvas id="barCanvas" width="480" height="300"></canvas>
    <h2 style="margin-top:14px">Distribution</h2>
    <canvas id="monthPieCanvas" width="480" height="300"></canvas>
  </section>

  <script src="popup.js"></script>
</body>
</html>
