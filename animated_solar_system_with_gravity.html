<h2 class="sr-only">Animated solar system simulation with orbiting planets, adjustable speed, and toggles showing gravity force and velocity vectors</h2>
<style>
.ctr{display:flex;flex-wrap:wrap;gap:10px 16px;align-items:center;margin:12px 0;font-size:13px;color:var(--color-text-secondary)}
.ctr label{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-top:12px}
.stat{background:var(--color-background-primary);border-radius:var(--border-radius-md);padding:10px 12px}
.stat .k{font-size:12px;color:var(--color-text-tertiary)}
.stat .v{font-size:15px;font-weight:500;color:var(--color-text-primary);margin-top:2px}
</style>
<div style="border-radius:var(--border-radius-lg);overflow:hidden;line-height:0">
<canvas id="sky" style="width:100%;aspect-ratio:680/700;display:block;cursor:pointer"></canvas>
</div>
<div class="ctr">
<button id="pp" aria-label="Play or pause" style="min-width:42px"><i class="ti ti-player-pause" id="ppi"></i></button>
<span>Speed</span>
<input type="range" id="spd" min="0.1" max="10" step="0.1" value="1" style="flex:1;min-width:120px">
<span id="spdo" style="min-width:64px;font-weight:500;color:var(--color-text-primary)">1.0 yr/s</span>
<span style="margin-left:auto">Elapsed: <span id="yrs" style="font-weight:500;color:var(--color-text-primary)">0.0 yr</span></span>
</div>
<div class="ctr">
<label><input type="checkbox" id="tOrb" checked> Orbits</label>
<label><input type="checkbox" id="tLab" checked> Labels</label>
<label><input type="checkbox" id="tTrail"> Trails</label>
<label><input type="checkbox" id="tGrav"> Gravity + velocity</label>
<span id="leg" style="display:none;gap:12px;align-items:center">
<span><span style="display:inline-block;width:14px;height:3px;background:#EF9F27;vertical-align:middle;margin-right:4px"></span>gravity pull</span>
<span><span style="display:inline-block;width:14px;height:3px;background:#3BC9A8;vertical-align:middle;margin-right:4px"></span>orbital velocity</span>
</span>
</div>
<div id="panel" style="background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:14px 16px"></div>
<script>
const cv=document.getElementById('sky'),cx2=cv.getContext('2d');
const W=680,H=700,CX=340,CY=350,dpr=Math.min(window.devicePixelRatio||1,2);
cv.width=W*dpr;cv.height=H*dpr;cx2.scale(dpr,dpr);
const orad=a=>45+62*Math.log(a/0.3);
const P=[
{n:'Mercury',c:'#9A938B',au:0.39,T:0.241,pr:3,v:47.4,g:'3.7 m/s²',di:'4,879 km',day:'59 Earth days',tp:'167°C',m:'0',f:'Shrinking as its iron core slowly cools'},
{n:'Venus',c:'#E6C36F',au:0.72,T:0.615,pr:5,v:35.0,g:'8.9 m/s²',di:'12,104 km',day:'243 Earth days',tp:'465°C',m:'0',f:'Spins backwards — the Sun rises in the west'},
{n:'Earth',c:'#3B7BD4',au:1,T:1,pr:5.5,v:29.8,g:'9.81 m/s²',di:'12,756 km',day:'24 hours',tp:'15°C',m:'1',f:'The only known world with liquid oceans and life'},
{n:'Mars',c:'#C1502E',au:1.52,T:1.881,pr:4,v:24.1,g:'3.7 m/s²',di:'6,792 km',day:'24.6 hours',tp:'-65°C',m:'2',f:'Olympus Mons stands 3× taller than Everest'},
{n:'Jupiter',c:'#C9A36B',au:5.2,T:11.86,pr:12,v:13.1,g:'24.8 m/s²',di:'142,984 km',day:'9.9 hours',tp:'-110°C',m:'95',f:'Its gravity shields the inner planets from comets'},
{n:'Saturn',c:'#DCC089',au:9.58,T:29.46,pr:10,v:9.7,g:'10.4 m/s²',di:'120,536 km',day:'10.7 hours',tp:'-140°C',m:'274',f:'Less dense than water — it would float'},
{n:'Uranus',c:'#8FD8DC',au:19.2,T:84.01,pr:7,v:6.8,g:'8.9 m/s²',di:'51,118 km',day:'17.2 hours',tp:'-195°C',m:'28',f:'Rolls on its side, tilted 98 degrees'},
{n:'Neptune',c:'#3D5BD9',au:30.05,T:164.8,pr:7,v:5.4,g:'11.2 m/s²',di:'49,528 km',day:'16.1 hours',tp:'-200°C',m:'16',f:'Winds here exceed 2,100 km/h'}
];
P.forEach((p,i)=>{p.R=orad(p.au);p.th=i*1.7;});
const SUN={n:'Sun',c:'#FDB813',v:0,g:'274 m/s²',di:'1.39 million km',day:'25 days (equator)',tp:'5,500°C surface',m:'8 planets',f:'Contains 99.86% of all mass in the solar system',au:0,T:0};
const stars=[];for(let i=0;i<90;i++)stars.push([Math.random()*W,Math.random()*H,Math.random()*1.2+0.3,Math.random()*0.5+0.2]);
const belt=[];for(let i=0;i<120;i++){const a=2.2+Math.random();belt.push({R:orad(a),th:Math.random()*6.283,w:6.283/Math.pow(a,1.5),s:Math.random()*0.9+0.4});}
let sim=0,speed=1,run=!matchMedia('(prefers-reduced-motion: reduce)').matches,trails=false,orb=true,lab=true,grav=false,sel=P[2],last=null,mth=0;
function arrow(x,y,dx,dy,L,col){const m=Math.hypot(dx,dy)||1;dx/=m;dy/=m;const ex=x+dx*L,ey=y+dy*L;cx2.strokeStyle=col;cx2.lineWidth=1.6;cx2.beginPath();cx2.moveTo(x,y);cx2.lineTo(ex,ey);cx2.stroke();const px=-dy,py=dx;cx2.beginPath();cx2.moveTo(ex,ey);cx2.lineTo(ex-dx*6+px*3,ey-dy*6+py*3);cx2.moveTo(ex,ey);cx2.lineTo(ex-dx*6-px*3,ey-dy*6-py*3);cx2.stroke();}
function draw(ts){
if(last==null)last=ts;const dt=Math.min((ts-last)/1000,0.1);last=ts;
if(run){sim+=dt*speed;mth+=dt*speed;belt.forEach(b=>b.th-=b.w*dt*speed);}
document.getElementById('yrs').textContent=sim.toFixed(1)+' yr';
if(trails){cx2.fillStyle='rgba(7,10,25,0.10)';cx2.fillRect(0,0,W,H);}else{cx2.fillStyle='#070A19';cx2.fillRect(0,0,W,H);}
stars.forEach(s=>{cx2.fillStyle='rgba(255,255,255,'+s[3]+')';cx2.beginPath();cx2.arc(s[0],s[1],s[2],0,6.283);cx2.fill();});
if(orb){cx2.strokeStyle='rgba(255,255,255,0.09)';cx2.lineWidth=0.7;P.forEach(p=>{cx2.beginPath();cx2.arc(CX,CY,p.R,0,6.283);cx2.stroke();});}
belt.forEach(b=>{const x=CX+b.R*Math.cos(b.th),y=CY+b.R*Math.sin(b.th);cx2.fillStyle='rgba(150,142,125,0.55)';cx2.fillRect(x,y,b.s,b.s);});
const pulse=1+0.04*Math.sin(sim*3);
cx2.fillStyle='rgba(253,184,19,0.10)';cx2.beginPath();cx2.arc(CX,CY,30*pulse,0,6.283);cx2.fill();
cx2.fillStyle='rgba(253,184,19,0.25)';cx2.beginPath();cx2.arc(CX,CY,22*pulse,0,6.283);cx2.fill();
cx2.fillStyle='#FDB813';cx2.beginPath();cx2.arc(CX,CY,16,0,6.283);cx2.fill();
cx2.fillStyle='rgba(252,201,74,0.6)';cx2.beginPath();cx2.arc(CX-4,CY-4,9,0,6.283);cx2.fill();
P.forEach(p=>{
const th=p.th-6.283*sim/p.T,x=CX+p.R*Math.cos(th),y=CY+p.R*Math.sin(th);p.x=x;p.y=y;
if(grav){arrow(x,y,CX-x,CY-y,10+26/Math.sqrt(p.au),'#EF9F27');arrow(x,y,Math.sin(th),-Math.cos(th),Math.max(8,p.v*1.05),'#3BC9A8');}
if(p.n==='Saturn'){cx2.save();cx2.translate(x,y);cx2.rotate(-0.35);cx2.strokeStyle='rgba(203,179,130,0.85)';cx2.lineWidth=2.5;cx2.beginPath();cx2.ellipse(0,0,p.pr+9,(p.pr+9)*0.32,0,0,6.283);cx2.stroke();cx2.restore();}
if(p.n==='Uranus'){cx2.save();cx2.translate(x,y);cx2.rotate(1.36);cx2.strokeStyle='rgba(191,232,234,0.5)';cx2.lineWidth=1.2;cx2.beginPath();cx2.ellipse(0,0,p.pr+5,(p.pr+5)*0.3,0,0,6.283);cx2.stroke();cx2.restore();}
cx2.fillStyle=p.c;cx2.beginPath();cx2.arc(x,y,p.pr,0,6.283);cx2.fill();
if(p.n==='Earth'){const mt=mth*6.283/0.0748,mx=x+10*Math.cos(mt),my=y+10*Math.sin(mt);cx2.fillStyle='#C9C9C9';cx2.beginPath();cx2.arc(mx,my,1.6,0,6.283);cx2.fill();}
if(p.n==='Jupiter'){cx2.fillStyle='rgba(192,83,58,0.9)';cx2.beginPath();cx2.ellipse(x+4,y+4,3,1.8,0,0,6.283);cx2.fill();}
if(sel===p){cx2.strokeStyle='rgba(255,255,255,0.8)';cx2.lineWidth=1;cx2.beginPath();cx2.arc(x,y,p.pr+5,0,6.283);cx2.stroke();}
if(lab){cx2.fillStyle='#9BA3C0';cx2.font='11px sans-serif';cx2.fillText(p.n,x+p.pr+5,y+3);}
});
if(sel===SUN){cx2.strokeStyle='rgba(255,255,255,0.8)';cx2.lineWidth=1;cx2.beginPath();cx2.arc(CX,CY,36,0,6.283);cx2.stroke();}
requestAnimationFrame(draw);}
requestAnimationFrame(draw);
function panel(o){
const rows=[['Diameter',o.di],['Distance',o.au?o.au+' AU':'—'],['Year length',o.T?(o.T<1?Math.round(o.T*365)+' days':o.T.toFixed(o.T<2?2:1)+' years'):'—'],['Day length',o.day],['Surface gravity',o.g],['Mean temp',o.tp],['Moons',o.m],['Orbital speed',o.v?o.v+' km/s':'—']];
document.getElementById('panel').innerHTML='<div style="display:flex;align-items:center;gap:10px"><span style="width:18px;height:18px;border-radius:50%;background:'+o.c+';display:inline-block"></span><span style="font-size:16px;font-weight:500;color:var(--color-text-primary)">'+o.n+'</span><span style="font-size:13px;color:var(--color-text-secondary)">'+o.f+'</span></div><div class="statgrid">'+rows.map(r=>'<div class="stat"><div class="k">'+r[0]+'</div><div class="v">'+r[1]+'</div></div>').join('')+'</div><button style="margin-top:12px" onclick="sendPrompt(\'Tell me everything interesting about '+o.n+'\')">Ask Claude about '+o.n+' ↗</button>';}
panel(sel);
cv.addEventListener('click',e=>{const r=cv.getBoundingClientRect(),x=(e.clientX-r.left)*W/r.width,y=(e.clientY-r.top)*H/r.height;
if(Math.hypot(x-CX,y-CY)<26){sel=SUN;panel(SUN);return;}
for(const p of P){if(Math.hypot(x-p.x,y-p.y)<p.pr+9){sel=p;panel(p);return;}}});
document.getElementById('pp').onclick=()=>{run=!run;document.getElementById('ppi').className=run?'ti ti-player-pause':'ti ti-player-play';};
document.getElementById('spd').oninput=e=>{speed=+e.target.value;document.getElementById('spdo').textContent=speed.toFixed(1)+' yr/s';};
document.getElementById('tOrb').onchange=e=>orb=e.target.checked;
document.getElementById('tLab').onchange=e=>lab=e.target.checked;
document.getElementById('tTrail').onchange=e=>trails=e.target.checked;
document.getElementById('tGrav').onchange=e=>{grav=e.target.checked;document.getElementById('leg').style.display=grav?'inline-flex':'none';};
if(!run)document.getElementById('ppi').className='ti ti-player-play';
</script>
