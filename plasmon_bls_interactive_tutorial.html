<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
const textClr = isDark ? '#c2c0b6' : '#3d3d3a';
const mutedClr = isDark ? '#7a7870' : '#888780';
const borderClr = isDark ? 'rgba(255,255,255,0.12)' : 'rgba(0,0,0,0.1)';
const bgClr = isDark ? '#1e1e1c' : '#ffffff';
const bg2 = isDark ? '#2a2a28' : '#f5f4ef';

Chart.defaults.color = mutedClr;
Chart.defaults.borderColor = borderClr;
Chart.defaults.font.family = 'var(--font-sans)';
Chart.defaults.font.size = 11;

let currentStep = 0;
const charts = {};

// ── Physics helpers ──────────────────────────────────────────────────────────
function epsGold(hv) {
  const ei=9.84, wp=9.01, gam=0.072, AL=1.09, wL=2.75, gL=0.65;
  const re = ei - wp*wp/(hv*hv+gam*gam) + AL*wL*wL*(wL*wL-hv*hv)/((wL*wL-hv*hv)**2+(gL*hv)**2);
  const im = wp*wp*gam/(hv*(hv*hv+gam*gam)) + AL*wL*wL*gL*hv/((wL*wL-hv*hv)**2+(gL*hv)**2);
  return [re, im];
}
function epsSilver(hv) {
  const ei=3.70, wp=9.17, gam=0.021, AL=0.845, wL=4.0, gL=0.40;
  const re = ei - wp*wp/(hv*hv+gam*gam) + AL*wL*wL*(wL*wL-hv*hv)/((wL*wL-hv*hv)**2+(gL*hv)**2);
  const im = wp*wp*gam/(hv*(hv*hv+gam*gam)) + AL*wL*wL*gL*hv/((wL*wL-hv*hv)**2+(gL*hv)**2);
  return [re, im];
}
function dzOblate(t) {
  if (Math.abs(t-1)<1e-4) return 1/3;
  const xi = Math.sqrt(1/t/t - 1);
  return (1+xi*xi)/(xi*xi*xi) * (xi - Math.atan(xi));
}
function dzProlate(t) {
  if (Math.abs(t-1)<1e-4) return 1/3;
  const z = Math.sqrt(1 - 1/t/t);
  return (1-z*z)/(z*z*z) * (0.5*Math.log((1+z)/(1-z)) - z);
}
function depolFactors(t) {
  const dz = t<=1 ? dzOblate(t) : dzProlate(t);
  return [dz, 0.5*(1-dz)];
}
function chiEllipsoid(hv, t, mat) {
  const [epRe, epIm] = mat==='Au' ? epsGold(hv) : epsSilver(hv);
  const [dz, dx] = depolFactors(t);
  const chiRe = (epRe-1)/(4*Math.PI), chiIm = epIm/(4*Math.PI);
  function div(cr, ci, dr, di) {
    const D = dr*dr+di*di; return [(cr*dr+ci*di)/D, (ci*dr-cr*di)/D];
  }
  function chi_comp(d) {
    const nr=1+4*Math.PI*chiRe*d, ni=4*Math.PI*chiIm*d;
    return div(chiRe, chiIm, nr, ni);
  }
  const [xxr,xxi]=chi_comp(dx), [zzr,zzi]=chi_comp(dz);
  return {xx:[xxr,xxi], zz:[zzr,zzi]};
}
function objF_single(hv, t, mat) {
  const chi = chiEllipsoid(hv, t, mat);
  const [xxr,xxi]=chi.xx, [zzr,zzi]=chi.zz;
  const invXX_r = xxr/(xxr*xxr+xxi*xxi), invXX_i = -xxi/(xxr*xxr+xxi*xxi);
  const invZZ_r = zzr/(zzr*zzr+zzi*zzi), invZZ_i = -zzi/(zzr*zzr+zzi*zzi);
  const [k0] = [hv/197.3];
  const gR = 0.05*Math.exp(-hv), gI = 0.03;
  const dr = invXX_r + k0*k0*gR, di = invXX_i + k0*k0*gI;
  const dr2 = invZZ_r + k0*k0*gR*0.7, di2 = invZZ_i + k0*k0*gI*0.7;
  return Math.sqrt(dr*dr+di*di) * Math.sqrt(dr2*dr2+di2*di2);
}

const STEPS = [
  // 0 ──────────────────────────────────────
  {
    tag: 'The big picture',
    title: 'Why do we need plasmon-enhanced BLS?',
    render: () => `
    <div class="card">
      <div class="section-title">The problem</div>
      <p class="body-text">Brillouin Light Scattering (BLS) detects <strong>spin waves</strong> (magnons) in magnetic thin films by measuring the tiny frequency shift of photons that bounce off them. But two fundamental limitations make it hard:</p>
      <div class="two-col" style="margin: .75rem 0;">
        <div class="mini-card"><div class="lbl">Limitation 1</div><div class="val" style="font-size:15px; color: var(--color-text-danger)">Low wave-number limit</div><p style="font-size:12px; color:var(--color-text-secondary); margin-top:4px">Only spin waves with small k can be detected with free-space light</p></div>
        <div class="mini-card"><div class="lbl">Limitation 2</div><div class="val" style="font-size:15px; color:var(--color-text-danger)">Low sensitivity</div><p style="font-size:12px; color:var(--color-text-secondary); margin-top:4px">Very few photons scatter inelastically — the BLS signal is faint</p></div>
      </div>
      <p class="body-text">The solution: put <strong>plasmonic nanoparticles</strong> on top of the magnetic film. They act as nanoscale antennas — concentrating the electromagnetic field at the film surface, boosting both problems at once.</p>
    </div>
    <div class="card">
      <div class="section-title">The system (Fig. 1)</div>
      <svg width="100%" viewBox="0 0 640 200">
        <defs><marker id="ar0" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
        <rect x="40" y="130" width="560" height="40" rx="4" fill="#4a3b8a" opacity=".7"/>
        <text x="320" y="155" text-anchor="middle" font-size="12" fill="#c9c2ff">GGG substrate  (ε₁ ≈ 3.78)</text>
        <rect x="40" y="90" width="560" height="38" rx="4" fill="#2e6e44" opacity=".75"/>
        <text x="320" y="113" text-anchor="middle" font-size="12" fill="#9fe8c2">YIG magnetic film  100 nm  (ε₂ ≈ 5.0)</text>
        <rect x="40" y="50" width="560" height="38" rx="4" fill="${borderClr}"/>
        <text x="320" y="73" text-anchor="middle" font-size="12" fill="${textClr}">Air  (ε₃ = 1)</text>
        <ellipse cx="220" cy="44" rx="22" ry="10" fill="#D4A017" opacity=".9"/>
        <ellipse cx="320" cy="44" rx="22" ry="10" fill="#D4A017" opacity=".9"/>
        <ellipse cx="420" cy="44" rx="22" ry="10" fill="#D4A017" opacity=".9"/>
        <text x="510" y="40" font-size="11" fill="${mutedClr}">Au nanoparticles</text>
        <line x1="480" y1="42" x2="445" y2="44" stroke="${mutedClr}" stroke-width="0.8" marker-end="url(#ar0)"/>
        <line x1="140" y1="10" x2="220" y2="44" stroke="#5ba3f5" stroke-width="1.5" marker-end="url(#ar0)"/>
        <text x="100" y="10" font-size="11" fill="#5ba3f5">Laser (I)</text>
        <line x1="220" y1="44" x2="140" y2="10" stroke="#f5895b" stroke-width="1.2" stroke-dasharray="3 2" marker-end="url(#ar0)"/>
        <text x="60" y="22" font-size="10" fill="#f5895b">BLS (R)</text>
      </svg>
      <p class="body-text" style="margin-top:.5rem">The laser hits the nanoparticles → local field is amplified → more photon–magnon scattering → stronger BLS signal collected at detector.</p>
    </div>
    `,
    afterRender: () => {}
  },
  // 1 ──────────────────────────────────────
  {
    tag: 'Method 1',
    title: 'The Drude–Lorentz dielectric function ε(ω)',
    render: () => `
    <div class="card">
      <div class="section-title">What is it?</div>
      <p class="body-text">Everything starts here. The dielectric function ε(ω) tells you how a metal responds to light at each frequency. For Au and Ag it combines two physical mechanisms:</p>
      <div class="two-col" style="margin:.6rem 0">
        <div class="mini-card"><div class="lbl">Drude term</div><p style="font-size:13px;color:var(--color-text-secondary);margin-top:4px"><strong>Free electrons</strong> sloshing back and forth. Dominates at low energy.</p></div>
        <div class="mini-card"><div class="lbl">Lorentz term</div><p style="font-size:13px;color:var(--color-text-secondary);margin-top:4px"><strong>Bound electrons</strong> resonating. Gives Au its golden color ~2.5 eV.</p></div>
      </div>
      <div class="eq-box">ε(ω) = ε<sub>∞</sub> − ω<sub>p</sub>² / (ω(ω + iγ))  +  A·ω<sub>L</sub>² / (ω<sub>L</sub>² − ω² − iγ<sub>L</sub>ω)</div>
      <p class="body-text">Where ε<sub>∞</sub> = background polarization, ω<sub>p</sub> = plasma frequency, γ = damping. The imaginary part ε'' is <strong>loss</strong> — energy absorbed as heat. Key physics: Au has larger ε'' than Ag, so Ag makes a better plasmonic enhancer.</p>
    </div>
    <div class="card">
      <div class="section-title">Interactive — ε(ω) for Au and Ag</div>
      <div class="slider-row">
        <label>Energy range</label>
        <input type="range" id="s-emax" min="2.0" max="4.0" step="0.1" value="3.5" oninput="updateDrude()">
        <span id="v-emax">3.5 eV</span>
      </div>
      <canvas id="chart-drude" height="220"></canvas>
      <div style="margin-top:8px; display:flex; gap:16px; flex-wrap:wrap;">
        <div class="legend-row"><div class="legend-dot" style="background:#D4A017"></div> Au  ε'</div>
        <div class="legend-row"><div class="legend-dot" style="background:#D4A017; opacity:.45"></div> Au  ε''</div>
        <div class="legend-row"><div class="legend-dot" style="background:#888"></div> Ag  ε'</div>
        <div class="legend-row"><div class="legend-dot" style="background:#888; opacity:.45"></div> Ag  ε''</div>
      </div>
    </div>
    `,
    afterRender: () => {
      const N=200;
      function mk() {
        const emax = parseFloat(document.getElementById('s-emax').value);
        const hvs = Array.from({length:N}, (_,i)=>1.4+i*(emax-1.4)/(N-1));
        const auR=[], auI=[], agR=[], agI=[];
        hvs.forEach(h=>{const[r,i]=epsGold(h); auR.push(r); auI.push(i);});
        hvs.forEach(h=>{const[r,i]=epsSilver(h); agR.push(r); agI.push(i);});
        return {labels:hvs.map(v=>v.toFixed(2)), auR, auI, agR, agI};
      }
      function draw() {
        const d = mk();
        if (charts['drude']) { charts['drude'].destroy(); }
        const ctx = document.getElementById('chart-drude').getContext('2d');
        charts['drude'] = new Chart(ctx, { type:'line', data:{labels:d.labels, datasets:[
          {label:'Au ε\'', data:d.auR, borderColor:'#D4A017', borderWidth:2, pointRadius:0, tension:.3},
          {label:'Au ε\'\'', data:d.auI, borderColor:'#D4A017', borderWidth:1.5, borderDash:[4,3], pointRadius:0, tension:.3, borderDashOffset:0},
          {label:'Ag ε\'', data:d.agR, borderColor:'#888', borderWidth:2, pointRadius:0, tension:.3},
          {label:'Ag ε\'\'', data:d.agI, borderColor:'#888', borderWidth:1.5, borderDash:[4,3], pointRadius:0, tension:.3},
        ]}, options:{animation:false, plugins:{legend:{display:false}}, scales:{
          x:{title:{display:true,text:'ℏω (eV)'}, ticks:{maxTicksLimit:8}},
          y:{title:{display:true,text:'ε'}, grid:{color:borderClr}}
        }}});
      }
      window.updateDrude = () => {
        document.getElementById('v-emax').textContent = parseFloat(document.getElementById('s-emax').value).toFixed(1)+' eV';
        draw();
      };
      draw();
    }
  },
  // 2 ──────────────────────────────────────
  {
    tag: 'Method 2',
    title: 'Depolarization factors — shape of the nanoparticle',
    render: () => `
    <div class="card">
      <div class="section-title">Why shape matters</div>
      <p class="body-text">When an electric field is applied to an ellipsoidal nanoparticle, the charges inside create an opposing "depolarization" field. Its strength depends entirely on the particle's shape, captured by factors d<sub>x</sub>, d<sub>z</sub>.</p>
      <div class="two-col" style="margin:.6rem 0">
        <div class="mini-card"><div class="lbl">Oblate  (t &lt; 1, flat disk)</div><p style="font-size:12px;color:var(--color-text-secondary);margin-top:3px">Large d<sub>z</sub> → resonance shifts to lower energy</p></div>
        <div class="mini-card"><div class="lbl">Prolate  (t &gt; 1, rod)</div><p style="font-size:12px;color:var(--color-text-secondary);margin-top:3px">Small d<sub>z</sub> → resonance shifts to higher energy</p></div>
      </div>
      <div class="eq-box">Oblate  (t=h<sub>z</sub>/h<sub>x</sub> ≤ 1):  d<sub>z</sub> = (1+ξ²)/ξ³ · (ξ − arctan ξ)
Prolate (t &gt; 1):         d<sub>z</sub> = (1−ζ²)/ζ³ · (½ln((1+ζ)/(1−ζ)) − ζ)
d<sub>x</sub> = d<sub>y</sub> = (1 − d<sub>z</sub>) / 2</div>
      <p class="body-text">The eccentricity <strong>t = h<sub>z</sub>/h<sub>x</sub></strong> is the key tuning parameter in all the optimization maps of the paper. At t=1 you have a sphere, d<sub>z</sub>=d<sub>x</sub>=⅓.</p>
    </div>
    <div class="card">
      <div class="section-title">Interactive — drag t to change shape</div>
      <div class="slider-row">
        <label>Eccentricity  t</label>
        <input type="range" id="s-t" min="0.05" max="4.0" step="0.05" value="1.0" oninput="updateDepolViz()">
        <span id="v-t">1.00</span>
      </div>
      <div style="display:flex; gap:12px; align-items:flex-start;">
        <canvas id="chart-depol" height="200" style="flex:1"></canvas>
        <div style="width:130px; flex-shrink:0;">
          <svg id="shape-viz" width="130" height="200" viewBox="0 0 130 200">
            <ellipse id="npe" cx="65" cy="100" rx="40" ry="40" fill="#D4A017" fill-opacity=".6" stroke="#D4A017" stroke-width="1.5"/>
            <line x1="65" y1="30" x2="65" y2="170" stroke="${mutedClr}" stroke-width="0.5" stroke-dasharray="3 2"/>
            <line x1="5" y1="100" x2="125" y2="100" stroke="${mutedClr}" stroke-width="0.5" stroke-dasharray="3 2"/>
            <text id="npe-lbl" x="65" y="190" text-anchor="middle" font-size="11" fill="${mutedClr}">sphere (t=1)</text>
          </svg>
          <div class="mini-card" style="margin-top:8px">
            <div class="lbl">d<sub>z</sub></div><div class="val" id="dz-val">0.333</div>
            <div class="lbl" style="margin-top:6px">d<sub>x</sub></div><div class="val" id="dx-val">0.333</div>
          </div>
        </div>
      </div>
    </div>
    `,
    afterRender: () => {
      const ts = Array.from({length:300}, (_,i)=>0.05+i*3.95/299);
      const dzArr=[], dxArr=[];
      ts.forEach(t=>{ const[dz,dx]=depolFactors(t); dzArr.push(dz); dxArr.push(dx); });

      if (charts['depol']) charts['depol'].destroy();
      const ctx = document.getElementById('chart-depol').getContext('2d');
      charts['depol'] = new Chart(ctx, { type:'line', data:{labels:ts.map(v=>v.toFixed(2)), datasets:[
        {label:'dz', data:dzArr, borderColor:'#5ba3f5', borderWidth:2, pointRadius:0},
        {label:'dx=dy', data:dxArr, borderColor:'#f5895b', borderWidth:2, pointRadius:0, borderDash:[4,3]},
      ]}, options:{animation:false, plugins:{legend:{display:true, labels:{boxWidth:12, font:{size:11}}}},
        scales:{x:{title:{display:true,text:'t = hz/hx'}, ticks:{maxTicksLimit:8}},
                y:{title:{display:true,text:'depolarization factor d'}, max:1}}}});

      window.updateDepolViz = () => {
        const t = parseFloat(document.getElementById('s-t').value);
        document.getElementById('v-t').textContent = t.toFixed(2);
        const [dz,dx]=depolFactors(t);
        document.getElementById('dz-val').textContent = dz.toFixed(3);
        document.getElementById('dx-val').textContent = dx.toFixed(3);
        const hx=40, hz=Math.max(5,Math.min(95, t*40));
        document.getElementById('npe').setAttribute('rx', hx);
        document.getElementById('npe').setAttribute('ry', hz);
        const lbl = t<0.9?'oblate (disk)':t>1.1?'prolate (rod)':'sphere (t=1)';
        document.getElementById('npe-lbl').textContent = lbl;
      };
    }
  },
  // 3 ──────────────────────────────────────
  {
    tag: 'Method 3',
    title: 'Effective susceptibility χ̃(ω) — how one nanoparticle responds',
    render: () => `
    <div class="card">
      <div class="section-title">The key formula (Eq. A1 / A5–A8)</div>
      <p class="body-text">The "effective susceptibility" χ tells you: for a given incident field, how large is the oscillating dipole moment of the nanoparticle? Larger χ → stronger local field → stronger BLS signal.</p>
      <p class="body-text" style="margin-top:.6rem">For an ellipsoidal particle <strong>in air</strong> (Eq. A1):</p>
      <div class="eq-box">χ<sup>(el)</sup><sub>ii</sub>(ω) = χ<sup>(pl)</sup>(ω) / [ 1 + 4π χ<sup>(pl)</sup>(ω) d<sub>i</sub> ]</div>
      <p class="body-text">When the particle sits <strong>on the YIG film</strong>, the film surface creates an image dipole that modifies the response (Eqs. A5–A8):</p>
      <div class="eq-box">χ̃<sub>xx</sub> = ε₃ V<sub>p</sub> (ε<sub>p</sub>−ε₃) / [ε₃ + (ε<sub>p</sub>−ε₃)d<sub>x</sub>] · L<sub>‖</sub>
L<sub>‖</sub> = [ 1 + (ε₃−ε₂)(ε<sub>p</sub>−ε₃) / (3(ε₃+ε₂)·denom) · ϑ ]⁻¹</div>
      <p class="body-text">The denominator goes to zero near <strong>plasmon resonance</strong> — that's where χ blows up and the local field is maximum.</p>
    </div>
    <div class="card">
      <div class="section-title">Interactive — |χ(ω)| vs photon energy</div>
      <div class="slider-row">
        <label>Eccentricity  t</label>
        <input type="range" id="s-tchi" min="0.1" max="3.0" step="0.05" value="0.5" oninput="updateChi()">
        <span id="v-tchi">0.50</span>
      </div>
      <div style="margin:.4rem 0; display:flex; gap:8px; flex-wrap:wrap;">
        <label style="font-size:13px;color:var(--color-text-secondary);display:flex;align-items:center;gap:6px;cursor:pointer"><input type="radio" name="mat" value="Au" checked onchange="updateChi()"> Au</label>
        <label style="font-size:13px;color:var(--color-text-secondary);display:flex;align-items:center;gap:6px;cursor:pointer"><input type="radio" name="mat" value="Ag" onchange="updateChi()"> Ag</label>
      </div>
      <canvas id="chart-chi" height="220"></canvas>

    <div class="card" style="border-left: 3px solid var(--color-border-info); border-radius: var(--border-radius-lg);">
      <div class="section-title">${s.tag}</div>
      <div class="main-title">${s.title}</div>
    </div>
    ${s.render()}
    <div class="nav">
      <button onclick="renderStep(${i-1})" ${i===0?'disabled style="opacity:.4"':''}>← Previous</button>
      <span class="counter">${i+1} / ${STEPS.length}</span>
      ${i===STEPS.length-1
        ? `<button class="primary" onclick="sendPrompt('I have finished the tutorial. Can you quiz me on the plasmon-enhanced BLS methods?')">Take quiz ↗</button>`
        : `<button class="primary" onclick="renderStep(${i+1})">Next →</button>`
      }
    </div>
  `;
  setTimeout(()=>s.afterRender(), 50);
}

renderStep(0);
</script>
